<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generator Kontrak Mitra — SPBU CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ff:'IBM Plex Sans',sans-serif;--fm:'IBM Plex Mono',monospace;--fs:'Noto Serif',serif;
  --blue:#1a56db;--blue-d:#1240a8;--blue-light:#e8f0fe;
  --green:#0e9f6e;--red:#e02424;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;--gray-900:#111827;
  --surface:#fff;--bg:#f0f2f5;--border:#e5e7eb;--text:#111827;--text-muted:#6b7280;
  --radius:8px;--radius-lg:12px;
}
body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* ─── TOPBAR ─────────────────────────── */
.topbar{
  background:var(--gray-900);color:#fff;
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  padding:5px 10px;background:transparent;
  border:1px solid rgba(255,255,255,.12);border-radius:6px;
  font-size:11px;color:var(--gray-400);cursor:pointer;font-family:var(--ff);
  text-decoration:none;transition:all .15s;
}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
.topbar-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:.06em;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.session-chip{
  font-size:11px;color:var(--gray-400);font-family:var(--fm);
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:4px 12px;
}
.session-chip.ok{color:#10b981;}

/* ─── MAIN FORM ──────────────────────── */
.page{max-width:760px;margin:0 auto;padding:28px 20px 60px;}
.page-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;
}
.card-head{
  background:var(--gray-50);border-bottom:1px solid var(--border);
  padding:13px 20px;display:flex;align-items:center;gap:10px;
}
.card-head-icon{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.card-head-title{font-size:13px;font-weight:600;color:var(--gray-800);}
.card-body{padding:20px;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.field-full{grid-column:1/-1;}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-label{
  font-size:11px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--gray-600);
}
.field-input{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-family:var(--ff);color:var(--text);
  background:#fff;outline:none;transition:border-color .15s;
}
.field-input:focus{border-color:var(--blue);}
.field-select{
  width:100%;padding:9px 12px;
  border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:14px;font-family:var(--ff);color:var(--text);
  background:#fff;outline:none;cursor:pointer;
}
.field-select:focus{border-color:var(--blue);}
.field-textarea{resize:vertical;min-height:80px;font-size:13px;line-height:1.6;}

/* ─── BOTTOM ACTION BAR ──────────────── */
.action-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:flex-end;gap:10px;
  z-index:20;
}
.btn-save{
  padding:10px 20px;background:transparent;
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;font-weight:500;cursor:pointer;font-family:var(--ff);
  color:var(--text-muted);transition:all .15s;
}
.btn-save:hover{background:var(--gray-50);color:var(--text);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-preview{
  padding:10px 24px;background:var(--gray-900);color:#fff;
  border:none;border-radius:var(--radius);
  font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff);
  letter-spacing:.04em;transition:background .15s;display:flex;align-items:center;gap:8px;
}
.btn-preview:hover{background:#374151;}

/* ─── PREVIEW OVERLAY ────────────────── */
.preview-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  z-index:50;
  display:none;
  flex-direction:column;
}
.preview-overlay.show{display:flex;}
.preview-topbar{
  background:var(--gray-900);color:#fff;
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.preview-topbar-left{display:flex;align-items:center;gap:10px;}
.preview-topbar-title{font-size:13px;font-weight:600;}
.preview-topbar-actions{display:flex;gap:8px;}
.btn-print{
  padding:7px 16px;background:var(--green);color:#fff;
  border:none;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:var(--ff);transition:background .15s;
}
.btn-print:hover{background:#0a7a5a;}
.btn-close-preview{
  padding:7px 14px;background:rgba(255,255,255,.08);color:#fff;
  border:1px solid rgba(255,255,255,.12);border-radius:6px;
  font-size:12px;cursor:pointer;font-family:var(--ff);transition:all .15s;
}
.btn-close-preview:hover{background:rgba(255,255,255,.15);}
.preview-scroll{flex:1;overflow-y:auto;padding:24px;background:#e5e7eb;}

/* ─── KONTRAK DOKUMEN ────────────────── */
.kontrak-doc{
  background:#fff;max-width:720px;margin:0 auto;
  padding:60px 70px;
  box-shadow:0 4px 24px rgba(0,0,0,.12);
}
.doc-header{text-align:center;margin-bottom:36px;padding-bottom:24px;border-bottom:2px solid #111;}
.doc-header-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;}
.doc-logo-box{width:52px;height:52px;background:#c00;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.doc-company-name{font-size:18px;font-weight:700;color:#111;letter-spacing:.02em;}
.doc-company-sub{font-size:11px;color:#555;margin-top:2px;}
.doc-title{font-family:var(--fs);font-size:20px;font-weight:700;color:#111;letter-spacing:.06em;margin-top:16px;}
.doc-body{font-family:var(--fs);font-size:13px;line-height:1.9;color:#1a1a1a;}
.doc-body p{margin-bottom:12px;}
.doc-body strong{font-weight:700;}
.pihak-section{background:#f8f9fa;border:1px solid #e5e7eb;border-radius:8px;padding:16px 20px;margin:20px 0;}
.pihak-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:10px;}
.pihak-row{display:flex;margin-bottom:6px;font-size:13px;}
.pihak-key{width:160px;color:#555;flex-shrink:0;}
.pihak-val{font-weight:500;color:#111;}
.pasal{margin:24px 0;}
.pasal-title{font-size:14px;font-weight:700;text-align:center;margin-bottom:10px;letter-spacing:.04em;}
.pasal-content{font-size:13px;line-height:1.85;}
.pasal-content ol{padding-left:20px;}
.pasal-content ol li{margin-bottom:6px;}
.ttd-section{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:60px;padding-top:24px;border-top:1px solid #e5e7eb;}
.ttd-box{text-align:center;}
.ttd-label{font-size:12px;color:#555;margin-bottom:4px;}
.ttd-role{font-size:11px;font-weight:600;color:#111;text-transform:uppercase;letter-spacing:.06em;}
.ttd-space{height:72px;border-bottom:1px solid #555;margin:16px 0 8px;}
.ttd-name{font-size:13px;font-weight:700;color:#111;}
.ttd-jabatan{font-size:11px;color:#666;margin-top:2px;}
.nomor-kontrak-badge{display:inline-block;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:6px 14px;font-family:var(--fm);font-size:13px;font-weight:600;color:#1e40af;margin-bottom:20px;}

@media print{
  .preview-topbar,.action-bar,.topbar{display:none!important;}
  .preview-overlay{position:static;display:block;background:none;}
  .preview-scroll{overflow:visible;padding:0;}
  .kontrak-doc{box-shadow:none;padding:40px 50px;max-width:100%;}
}
@media(max-width:600px){
  .field-grid,.field-grid-3{grid-template-columns:1fr;}
  .kontrak-doc{padding:32px 24px;}
  .page{padding:20px 14px 80px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Kembali</a>
    <span class="topbar-title">Generator Kontrak Mitra B2B</span>
  </div>
  <div class="topbar-right">
    <span class="session-chip" id="session-chip">Memeriksa login...</span>
  </div>
</div>

<!-- MAIN FORM -->
<div class="page">
  <div class="page-title">Buat Kontrak Kerjasama BBM</div>
  <div class="page-sub">Isi seluruh data di bawah, lalu klik "Lihat Preview Kontrak" untuk melihat dan mencetak dokumen.</div>

  <!-- Card 1: Data SPBU -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon" style="background:#e8f0fe;">🏪</div>
      <div class="card-head-title">Data SPBU — Pihak Pertama</div>
    </div>
    <div class="card-body">
      <div class="field-grid">
        <div class="field-group">
          <label class="field-label">Nama SPBU</label>
          <input class="field-input" id="spbu-nama" value="SPBU 76.981.01"/>
        </div>
        <div class="field-group">
          <label class="field-label">Kota</label>
          <input class="field-input" id="ttd-kota" value="Kendari"/>
        </div>
        <div class="field-group field-full">
          <label class="field-label">Alamat SPBU</label>
          <input class="field-input" id="spbu-alamat" placeholder="Jl. Soekarno Hatta, Kendari"/>
        </div>
        <div class="field-group">
          <label class="field-label">Nama Pimpinan</label>
          <input class="field-input" id="spbu-pimpinan" placeholder="Nama pengelola SPBU"/>
        </div>
        <div class="field-group">
          <label class="field-label">Jabatan</label>
          <input class="field-input" id="spbu-jabatan" value="Pengelola SPBU"/>
        </div>
      </div>
    </div>
  </div>

  <!-- Card 2: Data Mitra -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon" style="background:#d1fae5;">🏢</div>
      <div class="card-head-title">Data Mitra — Pihak Kedua</div>
    </div>
    <div class="card-body">
      <div class="field-grid">
        <div class="field-group field-full">
          <label class="field-label">Nama Perusahaan / Instansi</label>
          <input class="field-input" id="mitra-nama" placeholder="PT. Contoh Perusahaan"/>
        </div>
        <div class="field-group field-full">
          <label class="field-label">Alamat</label>
          <input class="field-input" id="mitra-alamat" placeholder="Alamat perusahaan"/>
        </div>
        <div class="field-group">
          <label class="field-label">NPWP</label>
          <input class="field-input" id="mitra-npwp" placeholder="00.000.000.0-000.000"/>
        </div>
        <div class="field-group">
          <label class="field-label">Nama Penandatangan</label>
          <input class="field-input" id="mitra-ttd-nama" placeholder="Nama direktur / pimpinan"/>
        </div>
        <div class="field-group">
          <label class="field-label">Jabatan Penandatangan</label>
          <input class="field-input" id="mitra-ttd-jabatan" placeholder="Direktur Utama"/>
        </div>
      </div>
    </div>
  </div>

  <!-- Card 3: Ketentuan Kontrak -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-icon" style="background:#fef3c7;">📋</div>
      <div class="card-head-title">Ketentuan Kontrak</div>
    </div>
    <div class="card-body">
      <div class="field-grid">
        <div class="field-group">
          <label class="field-label">Tanggal Mulai</label>
          <input class="field-input" id="tgl-mulai" type="date"/>
        </div>
        <div class="field-group">
          <label class="field-label">Tanggal Selesai</label>
          <input class="field-input" id="tgl-selesai" type="date"/>
        </div>
        <div class="field-group">
          <label class="field-label">Mekanisme Pembayaran</label>
          <select class="field-select" id="mekanisme-bayar" onchange="toggleInvoice()">
            <option value="tunai">Tunai saat transaksi</option>
            <option value="invoice">Invoice bulanan (kredit)</option>
          </select>
        </div>
        <div class="field-group" id="invoice-detail" style="display:none">
          <label class="field-label">Batas Pembayaran Invoice</label>
          <input class="field-input" id="batas-invoice" placeholder="Tanggal 10 setiap bulan"/>
        </div>
        <div class="field-group">
          <label class="field-label">Estimasi Volume / Bulan (Liter)</label>
          <input class="field-input" id="vol-estimasi" type="number" placeholder="1000"/>
        </div>
        <div class="field-group">
          <label class="field-label">Produk BBM Disepakati</label>
          <input class="field-input" id="produk-list" placeholder="Pertalite, Pertamax, Biosolar"/>
        </div>
        <div class="field-group">
          <label class="field-label">Tanggal Penandatanganan</label>
          <input class="field-input" id="ttd-tanggal" type="date"/>
        </div>
        <div class="field-group field-full">
          <label class="field-label">Ketentuan Khusus (opsional)</label>
          <textarea class="field-input field-textarea" id="ketentuan-khusus"
            placeholder="Misal: Pembelian minimal 50L per transaksi, kendaraan wajib menunjukkan identitas mitra, dll."></textarea>
        </div>
      </div>
    </div>
  </div>

</div><!-- .page -->

<!-- ACTION BAR -->
<div class="action-bar">
  <div style="display:flex;align-items:center;gap:8px;flex:1;">
    <select id="sel-mitra-save" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--ff);color:var(--text);background:#fff;outline:none;max-width:220px;display:none;">
      <option value="">— Pilih Mitra —</option>
    </select>
  </div>
  <button class="btn-save" onclick="saveToDb()" id="save-btn">Simpan ke Database</button>
  <button class="btn-preview" onclick="showPreview()">
    <span>👁</span> Lihat Preview Kontrak
  </button>
</div>

<!-- PREVIEW OVERLAY -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-topbar">
    <div class="preview-topbar-left">
      <span class="preview-topbar-title">Preview Kontrak</span>
    </div>
    <div class="preview-topbar-actions">
      <button class="btn-print" onclick="window.print()">🖨 Cetak / Simpan PDF</button>
      <button class="btn-close-preview" onclick="closePreview()">✕ Tutup</button>
    </div>
  </div>
  <div class="preview-scroll">
    <div class="kontrak-doc" id="kontrak-doc"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://vjmsqwdzprajgqrpohzl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqbXNxd2R6cHJhamdxcnBvaHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTM2MTgsImV4cCI6MjA5MDUyOTYxOH0.dPMY_HEozO267sA4IvfwCcf9s0_z2pmk7zYE19T2sCU';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Set default dates
const today = new Date();
const todayStr = today.toISOString().split('T')[0];
const nextYear = new Date(today.getFullYear()+1, today.getMonth(), today.getDate()).toISOString().split('T')[0];
document.getElementById('tgl-mulai').value = todayStr;
document.getElementById('tgl-selesai').value = nextYear;
document.getElementById('ttd-tanggal').value = todayStr;

function toggleInvoice() {
  const v = document.getElementById('mekanisme-bayar').value;
  document.getElementById('invoice-detail').style.display = v === 'invoice' ? 'block' : 'none';
}

function showPreview() {
  updatePreview();
  document.getElementById('preview-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// Tutup preview dengan Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePreview();
});

function fmtDate(str) {
  if (!str) return '_______________';
  return new Date(str).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
}

function fmtDateShort(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
}

function generateNomorKontrak() {
  const yr = today.getFullYear();
  const mo = String(today.getMonth()+1).padStart(2,'0');
  return `KTR/${yr}/${mo}/001`;
}

function updatePreview() {
  const data = {
    nomorKontrak: generateNomorKontrak(),
    spbuNama: document.getElementById('spbu-nama').value || '[Nama SPBU]',
    spbuAlamat: document.getElementById('spbu-alamat').value || '[Alamat SPBU]',
    spbuPimpinan: document.getElementById('spbu-pimpinan').value || '[Nama Pimpinan]',
    spbuJabatan: document.getElementById('spbu-jabatan').value || 'Pengelola SPBU',
    mitraNama: document.getElementById('mitra-nama').value || '[Nama Mitra]',
    mitraAlamat: document.getElementById('mitra-alamat').value || '[Alamat Mitra]',
    mitraNpwp: document.getElementById('mitra-npwp').value || '-',
    mitraTtdNama: document.getElementById('mitra-ttd-nama').value || '[Nama Penandatangan]',

  const mekanismeTeks = data.mekanisme === 'tunai'
    ? 'tunai pada setiap transaksi pengisian bahan bakar'
    : `kredit dengan sistem invoice bulanan, dibayarkan paling lambat ${data.batasInvoice}`;

  const volTeks = data.volEstimasi
    ? `Estimasi kebutuhan bahan bakar Pihak Kedua adalah <strong>${parseInt(data.volEstimasi).toLocaleString('id-ID')} (${numberToWords(parseInt(data.volEstimasi))} liter)</strong> per bulan.`
    : '';

  const ketentuanTambahan = data.ketentuanKhusus
    ? `<div class="pasal">
        <div class="pasal-title">PASAL 6<br>KETENTUAN KHUSUS</div>
        <div class="pasal-content"><p>${data.ketentuanKhusus.replace(/\n/g, '<br>')}</p></div>
       </div>` : '';

  document.getElementById('kontrak-doc').innerHTML = `
    <div class="doc-header">
      <div class="doc-header-logo">
        <div class="doc-logo-box">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <text x="18" y="26" text-anchor="middle" font-size="22" font-weight="900" fill="white" font-family="Arial">⛽</text>
          </svg>
        </div>
        <div>
          <div class="doc-company-name">PERTAMINA PATRA NIAGA</div>
          <div class="doc-company-sub">${data.spbuNama} · Sulawesi Tenggara</div>
        </div>
      </div>
      <div class="doc-title">PERJANJIAN KERJASAMA</div>
      <div class="doc-title" style="font-size:16px;margin-top:4px;">PENGADAAN BAHAN BAKAR MINYAK (BBM)</div>
      <div style="margin-top:12px;">
        <span class="nomor-kontrak-badge">${data.nomorKontrak}</span>
      </div>
    </div>

    <div class="doc-body">
      <p>Perjanjian Kerjasama ini dibuat dan ditandatangani pada hari <strong>${fmtDate(data.ttdTanggal)}</strong>, di <strong>${data.ttdKota}</strong>, oleh dan antara pihak-pihak sebagai berikut:</p>

      <div class="pihak-section">
        <div class="pihak-title">Pihak Pertama</div>
        <div class="pihak-row"><span class="pihak-key">Nama SPBU</span><span class="pihak-val">: ${data.spbuNama}</span></div>

function getDurationText(start, end) {
  if (!start || !end) return '_____ bulan';
  const ms = new Date(end) - new Date(start);
  const months = Math.round(ms / (30 * 864e5));
  if (months >= 12) return `${Math.round(months/12)} (${numberToWords(Math.round(months/12))} tahun)`;
  return `${months} (${numberToWords(months)} bulan)`;
}

function numberToWords(n) {
  const w = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan',
    'sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas',
    'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas', 'dua puluh',
    'dua puluh satu', 'dua puluh empat', 'tiga puluh', 'tiga puluh enam'];
  const map = {1:'satu',2:'dua',3:'tiga',4:'empat',5:'lima',6:'enam',7:'tujuh',8:'delapan',
    9:'sembilan',10:'sepuluh',11:'sebelas',12:'dua belas',24:'dua puluh empat',36:'tiga puluh enam',
    48:'empat puluh delapan',500:'lima ratus',1000:'seribu'};
  return map[n] || n.toLocaleString('id-ID');
}

// State session
let sessionUser = null, sessionProfile = null, mitraList = [], spbuList = [];

async function initSession() {
  const { data: { session } } = await sb.auth.getSession();
  const chip = document.getElementById('session-chip');

  if (!session) {
    chip.textContent = '⚠ Belum login';
    chip.style.color = '#f59e0b';
    return;
  }
  sessionUser = session.user;

  const res = await fetch(
    `${SUPA_URL}/rest/v1/profiles?id=eq.${sessionUser.id}&select=id,nama,role,spbu_id&limit=1`,
    { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${session.access_token}` } }
  );
  const profiles = await res.json();
  sessionProfile = profiles?.[0];

  if (!sessionProfile) {
    chip.textContent = '⚠ Profil tidak ditemukan';
    chip.style.color = '#ef4444';
    return;
  }

  const roleLabel = { super_admin: 'Super Admin', manager: 'Manager', operator: 'Operator', mitra: 'Mitra' };
  chip.textContent = `✓ ${sessionProfile.nama} · ${roleLabel[sessionProfile.role] || sessionProfile.role}`;
  chip.classList.add('ok');

  // Load SPBU list
  const spbuRes = await fetch(
    `${SUPA_URL}/rest/v1/spbu?select=id,kode,nama&aktif=eq.true&order=kode`,
    { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${session.access_token}` } }
  );
  spbuList = await spbuRes.json() || [];

  // Load mitra list — manager filter by spbu_id
  let mitraUrl = `${SUPA_URL}/rest/v1/mitra?select=id,nama_perusahaan,spbu_id&status=eq.aktif&order=nama_perusahaan`;
  if (sessionProfile.role === 'manager' && sessionProfile.spbu_id) {
    mitraUrl += `&spbu_id=eq.${sessionProfile.spbu_id}`;
  }
  const mitraRes = await fetch(mitraUrl,
    { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${session.access_token}` } }
  );
  mitraList = await mitraRes.json() || [];

  // Tampilkan dropdown pilih mitra di action bar
  const sel = document.getElementById('sel-mitra-save');
  if (mitraList.length > 0) {
    sel.innerHTML = '<option value="">— Pilih Mitra —</option>' +
      mitraList.map(m => `<option value="${m.id}" data-spbu="${m.spbu_id}">${m.nama_perusahaan}</option>`).join('');
    sel.style.display = 'block';

    // Jika hanya ada 1 mitra, auto-select
    if (mitraList.length === 1) {
      sel.value = mitraList[0].id;
      // Auto-fill nama mitra di form jika kosong
      const namaEl = document.getElementById('mitra-nama');
      if (!namaEl.value) namaEl.value = mitraList[0].nama_perusahaan;
    }
  }
}

async function saveToDb() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { alert('Anda belum login.'); return; }
  if (!sessionProfile) { alert('Profil tidak ditemukan. Refresh halaman.'); return; }

  // Ambil mitra dari dropdown
  const sel = document.getElementById('sel-mitra-save');
  const mitraId = sel.value;
  if (!mitraId) {
    sel.style.border = '2px solid red';
    alert('Pilih Mitra terlebih dahulu dari dropdown di bawah kiri.');
    return;
  }
  sel.style.border = '';

  // Ambil spbu_id dari mitra yang dipilih atau dari profil manager
  const selectedMitra = mitraList.find(m => m.id === mitraId);
  const spbuId = selectedMitra?.spbu_id || sessionProfile.spbu_id || spbuList[0]?.id;

  if (!spbuId) {
    alert('SPBU tidak terdeteksi. Pastikan mitra sudah terhubung ke SPBU.');
    return;
  }

  const btn = document.getElementById('save-btn');
  const origText = btn.textContent;
  btn.textContent = 'Menyimpan...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/save-kontrak', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        mitra_id:          mitraId,
        spbu_id:           spbuId,
        tanggal_mulai:     document.getElementById('tgl-mulai').value,
        tanggal_selesai:   document.getElementById('tgl-selesai').value,
        volume_estimasi:   document.getElementById('vol-estimasi').value || null,
        syarat_pembayaran: document.getElementById('mekanisme-bayar').value === 'invoice'
          ? `Invoice bulanan, batas pembayaran tanggal ${document.getElementById('batas-invoice').value || '10'} setiap bulan`
          : 'Tunai saat transaksi',
        ketentuan_khusus:  document.getElementById('ketentuan-khusus').value || null,
        disetujui_oleh:    document.getElementById('mitra-ttd-nama').value || null,
        jabatan_penanda:   document.getElementById('mitra-ttd-jabatan').value || null,
        status: 'aktif',
      })
    });

    const result = await res.json();
    if (!res.ok) { alert('Gagal: ' + (result.error || 'Unknown error')); return; }

    // Tampilkan nomor kontrak yang terbuat
    const nomor = result.kontrak?.nomor_kontrak || '—';
    alert(`✅ Kontrak berhasil disimpan!\nNomor: ${nomor}\n\nKontrak akan muncul di tab Kontrak portal mitra.`);

    // Update nomor di preview
    document.querySelectorAll('.nomor-kontrak-badge').forEach(el => el.textContent = nomor);

  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

updatePreview();
